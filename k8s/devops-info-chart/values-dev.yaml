replicaCount: 1

image:
  tag: latest

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

service:
  type: NodePort
  nodePort: 30081

livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 5

k8sSecret:
  data:
    username: "dev-user"
    password: "dev-password"

vault:
  enabled: false
