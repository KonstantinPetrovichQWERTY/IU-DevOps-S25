replicaCount: 3

image:
  repository: konstantinqwertin/devops-info-app
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: null

containerPort: 8000

env:
  - name: PORT
    value: "8000"
  - name: HOST
    value: "0.0.0.0"

serviceAccount:
  create: true
  name: ""

k8sSecret:
  create: true
  name: ""
  data:
    username: "change-me-user"
    password: "change-me-password"

vault:
  enabled: false
  role: "devops-info-role"
  secretPath: "secret/data/devops-info/config"
  injectedFileName: "vault-config"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

securityContext:
  allowPrivilegeEscalation: false

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

hookJobs:
  image: busybox:1.36
  pullPolicy: IfNotPresent
  preInstall:
    enabled: true
    weight: "-5"
  postInstall:
    enabled: true
    weight: "5"
