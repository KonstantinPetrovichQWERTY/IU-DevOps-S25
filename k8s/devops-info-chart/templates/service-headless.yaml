{{- if eq .Values.workload.kind "statefulset" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-chart.headlessServiceName" . }}
  labels:
    {{- include "devops-info-chart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "devops-info-chart.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{- end }}
